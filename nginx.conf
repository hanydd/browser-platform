events {}

http {

  server {

    listen 80;

    location /vnc/ {
      proxy_pass http://browser-desktop/;
    }

    location /cdp/ {
      proxy_pass http://browserless:3000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

  }

}