services:

  browserless:
    image: browserless/chrome:latest
    container_name: cloud-browser
    restart: unless-stopped
    ports:
      - "3000:3000" # CDP endpoint
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - CONNECTION_TIMEOUT=600000
      - ENABLE_DEBUGGER=true
      - DEFAULT_BLOCK_ADS=true
      - DEFAULT_STEALTH=true
    shm_size: "2gb"

  xvfb:
    image: dorowu/ubuntu-desktop-lxde-vnc
    container_name: browser-desktop
    restart: unless-stopped
    ports:
      - "6080:80" # noVNC web
      - "5900:5900" # VNC
      - "6079:6079" # VNC
    environment:
      - RESOLUTION=1280x800
      - VNC_PASSWORD=agentbrowser

  nginx:
    image: nginx:stable
    container_name: browser-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
