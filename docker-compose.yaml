services:

  browser:
    image: agent-desk:latest
    container_name: cloud-browser
    restart: unless-stopped
    ports:
      - "9230:9222" # CDP for agent (Playwright / Puppeteer / browser-use)
      - "6080:6080" # noVNC for user viewing
    shm_size: "2gb"
    environment:
      - RESOLUTION=1280x800x24
